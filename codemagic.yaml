workflows:
  ios-capacitor:
    name: iOS Capacitor Build
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.solocab.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.solocab.app"
        APP_STORE_APPLE_ID: 0000000000
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci || npm install
      - name: Build web assets
        script: |
          npm run build
      - name: Add iOS platform if missing
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
      - name: Capacitor sync iOS
        script: |
          npx cap sync ios
      - name: iOS preflight - validate workspace & scheme
        script: |
          set -e
          echo "🔍 Préflight iOS — vérification des fichiers du projet"
          echo ""
          echo "📂 Contenu de ios/ :"
          ls -la ios/ || { echo "❌ Dossier ios/ introuvable"; exit 1; }
          echo ""
          echo "📂 Contenu de ios/App/ :"
          ls -la ios/App/ || { echo "❌ Dossier ios/App/ introuvable"; exit 1; }
          echo ""
          if [ ! -d "$XCODE_WORKSPACE" ]; then
            echo "❌ ERREUR : Xcode workspace introuvable à : $XCODE_WORKSPACE"
            echo "   Workspaces .xcworkspace présents dans le repo :"
            find ios -name "*.xcworkspace" -maxdepth 4 -type d || true
            exit 1
          fi
          echo "✅ Workspace trouvé : $XCODE_WORKSPACE"
          echo ""
          echo "📋 Liste des schémas disponibles dans le workspace :"
          AVAILABLE_SCHEMES=$(xcodebuild -workspace "$XCODE_WORKSPACE" -list 2>/dev/null || true)
          echo "$AVAILABLE_SCHEMES"
          if ! echo "$AVAILABLE_SCHEMES" | grep -qE "^[[:space:]]+${XCODE_SCHEME}$"; then
            echo "❌ ERREUR : Schéma '$XCODE_SCHEME' introuvable dans le workspace."
            exit 1
          fi
          echo "✅ Schéma '$XCODE_SCHEME' trouvé"
          echo ""
          echo "📄 Podfile :"
          test -f ios/App/Podfile && echo "✅ Podfile présent" || { echo "❌ Podfile manquant"; exit 1; }
          echo ""
          echo "🎯 Préflight iOS réussi — prêt pour xcodebuild"
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Increment build number
        script: |
          cd ios/App
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "0")
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
      - name: Build .ipa
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
      - name: Verify .ipa artifact exists
        script: |
          set -e
          echo "🔍 Vérification de la présence du .ipa avant publication"
          IPA_FILE=$(find build/ios/ipa -maxdepth 2 -name "*.ipa" | head -n 1)
          if [ -z "$IPA_FILE" ] || [ ! -f "$IPA_FILE" ]; then
            echo "❌ ERREUR : aucun fichier .ipa trouvé dans build/ios/ipa/"
            echo "   Contenu du dossier :"
            ls -la build/ios/ipa/ 2>/dev/null || echo "   (dossier inexistant)"
            exit 1
          fi
          IPA_SIZE=$(du -h "$IPA_FILE" | cut -f1)
          echo "✅ .ipa trouvé : $IPA_FILE ($IPA_SIZE)"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - SoloCab Internal Testers
        submit_to_app_store: false

  android-capacitor:
    name: Android Capacitor Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - google_play
      android_signing:
        - solocab_keystore
      vars:
        PACKAGE_NAME: "com.solocab.app"
      node: latest
      java: 21
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Set JAVA_HOME to JDK 21
        script: |
          set -e
          echo "🔍 Recherche d'un JDK 21 installé sur la machine de build..."
          JDK21=$(/usr/libexec/java_home -v 21 2>/dev/null || true)
          if [ -z "$JDK21" ]; then
            echo "❌ Aucun JDK 21 trouvé. Versions disponibles :"
            /usr/libexec/java_home -V || true
            exit 1
          fi
          echo "✅ JDK 21 trouvé : $JDK21"
          echo "JAVA_HOME=$JDK21" >> $CM_ENV
          echo "PATH=$JDK21/bin:$PATH" >> $CM_ENV
      - name: Verify Java version
        script: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
      - name: Validate Google Play credentials
        script: |
          set -e
          if [ -z "$GCLOUD_SERVICE_ACCOUNT_CREDENTIALS" ]; then
            echo "❌ Variable GCLOUD_SERVICE_ACCOUNT_CREDENTIALS introuvable dans le groupe google_play."
            echo "   Vérifie que la variable existe exactement avec ce nom dans Codemagic → Environment variables → groupe google_play."
            exit 1
          fi
          python3 - <<'PY'
          import json, os, sys
          raw = os.environ.get("GCLOUD_SERVICE_ACCOUNT_CREDENTIALS", "")
          try:
              data = json.loads(raw)
          except Exception as exc:
              print("❌ GCLOUD_SERVICE_ACCOUNT_CREDENTIALS n'est pas un JSON valide.")
              print("   Il faut coller le contenu complet du fichier JSON, pas le nom du fichier ni du texte encodé.")
              print(f"   Détail parse JSON: {exc}")
              sys.exit(1)
          required = ["type", "project_id", "private_key", "client_email", "token_uri"]
          missing = [key for key in required if not data.get(key)]
          if missing:
              print("❌ JSON Google Play incomplet. Champs manquants: " + ", ".join(missing))
              sys.exit(1)
          print("✅ Credentials Google Play lus et JSON valide.")
          PY
      - name: Install npm dependencies
        script: |
          npm ci || npm install
      - name: Build web assets
        script: |
          npm run build
      - name: Add Android platform if missing
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
      - name: Capacitor sync Android
        script: |
          npx cap sync android
      - name: Set Gradle wrapper executable
        script: |
          chmod +x android/gradlew
      - name: Map Codemagic signing vars to Gradle
        script: |
          set -e
          echo "🔐 Mapping des variables de signature Codemagic vers Gradle"
          if [ -z "$CM_KEYSTORE_PATH" ]; then
            echo "❌ CM_KEYSTORE_PATH est vide — le keystore 'solocab_keystore' n'est pas attaché au workflow."
            echo "   Vérifie : Codemagic UI → Code signing identities → solocab_keystore est bien référencé."
            exit 1
          fi
          echo "✅ Keystore trouvé : $CM_KEYSTORE_PATH"
          echo "SOLOCAB_RELEASE_STORE_FILE=$CM_KEYSTORE_PATH" >> $CM_ENV
          echo "SOLOCAB_RELEASE_STORE_PASSWORD=$CM_KEYSTORE_PASSWORD" >> $CM_ENV
          echo "SOLOCAB_RELEASE_KEY_ALIAS=$CM_KEY_ALIAS" >> $CM_ENV
          echo "SOLOCAB_RELEASE_KEY_PASSWORD=$CM_KEY_PASSWORD" >> $CM_ENV
      - name: Build Android App Bundle (.aab)
        script: |
          set -e
          cd android
          echo "🔍 Vérification finale des variables de signature :"
          echo "  STORE_FILE=$SOLOCAB_RELEASE_STORE_FILE"
          echo "  KEY_ALIAS=$SOLOCAB_RELEASE_KEY_ALIAS"
          echo "  STORE_PASSWORD set: $([ -n "$SOLOCAB_RELEASE_STORE_PASSWORD" ] && echo yes || echo NO)"
          echo "  KEY_PASSWORD set:   $([ -n "$SOLOCAB_RELEASE_KEY_PASSWORD" ] && echo yes || echo NO)"
          if [ ! -f "$SOLOCAB_RELEASE_STORE_FILE" ]; then
            echo "❌ Le fichier keystore est introuvable à : $SOLOCAB_RELEASE_STORE_FILE"
            exit 1
          fi
          set +e
          bash -lc './gradlew bundleRelease --stacktrace --info --warning-mode all --no-daemon 2>&1 | tee ../android-gradle-build.log; exit ${PIPESTATUS[0]}'
          GRADLE_STATUS=$?
          set -e
          if [ "$GRADLE_STATUS" -ne 0 ]; then
            echo "❌ Gradle a échoué. Extrait ciblé des erreurs :"
            grep -n -E "FAILURE:|What went wrong|Execution failed|Caused by:|Compilation failed|Manifest merger failed|Duplicate class|error:|Could not" ../android-gradle-build.log | tail -n 160 || true
            exit "$GRADLE_STATUS"
          fi
      - name: Verify .aab artifact exists
        script: |
          set -e
          echo "🔍 Vérification de la présence du .aab avant publication"
          AAB_FILE=$(find android/app/build/outputs -name "*.aab" | head -n 1)
          if [ -z "$AAB_FILE" ] || [ ! -f "$AAB_FILE" ]; then
            echo "❌ ERREUR : aucun fichier .aab trouvé dans android/app/build/outputs/"
            echo "   Contenu du dossier :"
            find android/app/build/outputs -type f 2>/dev/null || echo "   (dossier inexistant)"
            exit 1
          fi
          AAB_SIZE=$(du -h "$AAB_FILE" | cut -f1)
          echo "✅ .aab trouvé : $AAB_FILE ($AAB_SIZE)"
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/mapping.txt
      - android-gradle-build.log
      - android/build/reports/problems/problems-report.html
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
