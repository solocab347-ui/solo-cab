name: Android APK Build

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

env:
  NPM_CONFIG_LEGACY_PEER_DEPS: "true"

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare log directory
        run: mkdir -p logs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Diagnose Android toolchain
        shell: bash
        run: |
          set -o pipefail
          source scripts/android-java-home.sh || true
          {
            echo "JAVA_HOME=${JAVA_HOME:-<unset>}"
            java -version
            echo "ANDROID_HOME=${ANDROID_HOME:-<unset>}"
            echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-<unset>}"
            sdkmanager --list_installed || true
          } 2>&1 | tee logs/android-toolchain.log

      - name: Install dependencies
        shell: bash
        run: |
          set -o pipefail
          npm install --legacy-peer-deps 2>&1 | tee logs/npm-install.log

      - name: Diagnose dependency alignment
        shell: bash
        run: |
          set -o pipefail
          npm ls @stripe/react-stripe-js @stripe/stripe-js 2>&1 | tee logs/stripe-deps.log || true
          npm ls @capacitor/core @capacitor/android @capacitor/cli 2>&1 | tee logs/capacitor-deps.log || true

      - name: Build web bundle
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee logs/web-build.log

      - name: Ensure Android platform exists
        shell: bash
        run: |
          set -o pipefail
          if [ ! -f android/app/build.gradle ] && [ ! -f android/app/build.gradle.kts ]; then
            rm -rf android
            npx cap add android 2>&1 | tee logs/cap-add-android.log
          else
            echo "android/ already present; skipping npx cap add android" | tee logs/cap-add-android.log
          fi

      - name: Apply native patches
        shell: bash
        run: |
          set -o pipefail
          bash scripts/patch-native.sh 2>&1 | tee logs/patch-native.log

      - name: Sync Capacitor Android
        shell: bash
        env:
          ANDROID_VERIFY_REQUIRE_WEB_ASSETS: "1"
        run: |
          set -o pipefail
          npm run android:verify 2>&1 | tee logs/android-verify-presync.log
          npx cap sync android 2>&1 | tee logs/cap-sync-android.log

      - name: Verify Android package consistency
        shell: bash
        run: |
          set -o pipefail
          npm run android:doctor 2>&1 | tee logs/android-doctor.log
          npm run android:verify 2>&1 | tee logs/android-verify.log

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          source scripts/android-java-home.sh
          chmod +x android/gradlew
          (cd android && ./gradlew assembleDebug --stacktrace --info) 2>&1 | tee logs/gradle-assemble-debug.log

      - name: Collect APK artifacts
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts/apk artifacts/logs artifacts/gradle-reports
          cp -R logs/. artifacts/logs/ 2>/dev/null || true
          find android/app/build/outputs/apk -type f -name '*.apk' -exec cp {} artifacts/apk/ \; 2>/dev/null || true
          cp -R android/app/build/reports/. artifacts/gradle-reports/ 2>/dev/null || true

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solocab-android-apk-${{ github.run_number }}
          path: artifacts/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solocab-android-build-logs-${{ github.run_number }}
          path: |
            artifacts/logs/**/*
            artifacts/gradle-reports/**/*
          if-no-files-found: warn
          retention-days: 14
