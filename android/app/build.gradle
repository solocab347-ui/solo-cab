apply plugin: 'com.android.application'

android {
    namespace = "com.solocab.app"
    compileSdk = rootProject.ext.compileSdkVersion
    signingConfigs {
        release {
            def releaseStoreFile = System.getenv("SOLOCAB_RELEASE_STORE_FILE") ?: System.getenv("RELEASE_STORE_FILE") ?: project.findProperty("SOLOCAB_RELEASE_STORE_FILE") ?: project.findProperty("RELEASE_STORE_FILE")
            def releaseKeyAlias = System.getenv("SOLOCAB_RELEASE_KEY_ALIAS") ?: System.getenv("RELEASE_KEY_ALIAS") ?: project.findProperty("SOLOCAB_RELEASE_KEY_ALIAS") ?: project.findProperty("RELEASE_KEY_ALIAS")
            def releaseStorePassword = System.getenv("SOLOCAB_RELEASE_STORE_PASSWORD") ?: System.getenv("RELEASE_STORE_PASSWORD") ?: project.findProperty("SOLOCAB_RELEASE_STORE_PASSWORD") ?: project.findProperty("RELEASE_STORE_PASSWORD")
            def releaseKeyPassword = System.getenv("SOLOCAB_RELEASE_KEY_PASSWORD") ?: System.getenv("RELEASE_KEY_PASSWORD") ?: project.findProperty("SOLOCAB_RELEASE_KEY_PASSWORD") ?: project.findProperty("RELEASE_KEY_PASSWORD")

            if (releaseStoreFile) {
                storeFile file(releaseStoreFile)
            }
            keyAlias releaseKeyAlias
            storePassword releaseStorePassword
            keyPassword releaseKeyPassword
        }
    }
    defaultConfig {
        applicationId "com.solocab.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

tasks.configureEach { task ->
    if (task.name in ["assembleRelease", "bundleRelease"]) {
        task.doFirst {
            def required = [
                "SOLOCAB_RELEASE_STORE_FILE or RELEASE_STORE_FILE": System.getenv("SOLOCAB_RELEASE_STORE_FILE") ?: System.getenv("RELEASE_STORE_FILE") ?: project.findProperty("SOLOCAB_RELEASE_STORE_FILE") ?: project.findProperty("RELEASE_STORE_FILE"),
                "SOLOCAB_RELEASE_KEY_ALIAS or RELEASE_KEY_ALIAS": System.getenv("SOLOCAB_RELEASE_KEY_ALIAS") ?: System.getenv("RELEASE_KEY_ALIAS") ?: project.findProperty("SOLOCAB_RELEASE_KEY_ALIAS") ?: project.findProperty("RELEASE_KEY_ALIAS"),
                "SOLOCAB_RELEASE_STORE_PASSWORD or RELEASE_STORE_PASSWORD": System.getenv("SOLOCAB_RELEASE_STORE_PASSWORD") ?: System.getenv("RELEASE_STORE_PASSWORD") ?: project.findProperty("SOLOCAB_RELEASE_STORE_PASSWORD") ?: project.findProperty("RELEASE_STORE_PASSWORD"),
                "SOLOCAB_RELEASE_KEY_PASSWORD or RELEASE_KEY_PASSWORD": System.getenv("SOLOCAB_RELEASE_KEY_PASSWORD") ?: System.getenv("RELEASE_KEY_PASSWORD") ?: project.findProperty("SOLOCAB_RELEASE_KEY_PASSWORD") ?: project.findProperty("RELEASE_KEY_PASSWORD")
            ]
            def missing = required.findAll { _, value -> !value }.keySet()
            if (!missing.isEmpty()) {
                throw new GradleException("Signature release Android incomplète. Paramètres manquants: ${missing.join(', ')}")
            }
            def releaseStoreFile = required["SOLOCAB_RELEASE_STORE_FILE or RELEASE_STORE_FILE"]
            if (!file(releaseStoreFile).exists()) {
                throw new GradleException("Fichier keystore release introuvable: ${releaseStoreFile}")
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')

    // Firebase Cloud Messaging — bibliothèque BOM pour aligner les versions
    implementation platform('com.google.firebase:firebase-bom:33.5.1')
    implementation 'com.google.firebase:firebase-messaging'
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
