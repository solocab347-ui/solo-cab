<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1e3a5f" />

    <!-- Security headers (defense-in-depth, complète les headers serveur) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://api.mapbox.com https://*.lovableproject.com https://cdn.gpteng.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com https://api.mapbox.com https://*.tiles.mapbox.com https://events.mapbox.com https://*.ingest.sentry.io https://*.lovableproject.com wss://*.lovableproject.com; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline' https://api.mapbox.com; frame-src https://js.stripe.com https://hooks.stripe.com; font-src 'self' data: https://api.mapbox.com; object-src 'none'; base-uri 'self'; form-action 'self'" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="geolocation=(self), camera=(self), microphone=(self), payment=(self)" />

    <!-- Primary SEO Meta Tags -->
    <title>SoloCab - Chauffeur VTC Privé | Réservation Course & Transfert Aéroport</title>
    <meta name="description" content="Réservez votre chauffeur VTC privé en quelques clics. Transferts aéroport CDG, Orly, gare. Service premium, tarifs transparents. Votre chauffeur exclusif vous attend." />
    <meta name="keywords" content="VTC, chauffeur privé, transfert aéroport, CDG, Orly, réservation VTC, course privée, transport premium, taxi privé, chauffeur exclusif, mise à disposition" />
    <meta name="author" content="SoloCab" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://solocab.fr" />

    <!-- Geographic Meta Tags -->
    <meta name="geo.region" content="FR" />
    <meta name="geo.placename" content="France" />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://solocab.fr" />
    <meta property="og:title" content="SoloCab - Votre Chauffeur VTC Privé & Exclusif" />
    <meta property="og:description" content="Réservez votre chauffeur VTC privé. Transferts aéroport CDG, Orly. Service premium 24h/24. Tarifs transparents, paiement sécurisé." />
    <meta property="og:image" content="https://solocab.fr/og-image.jpg" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:site_name" content="SoloCab" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@SoloCab" />
    <meta name="twitter:title" content="SoloCab - Chauffeur VTC Privé | Transfert Aéroport" />
    <meta name="twitter:description" content="Réservez votre chauffeur VTC privé. Transferts aéroport, courses longue distance. Service premium, tarifs clairs." />
    <meta name="twitter:image" content="https://solocab.fr/og-image.jpg" />

    <!-- Structured Data - Local Business -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "SoloCab",
      "description": "Service de VTC premium avec chauffeurs privés exclusifs. Transferts aéroport, courses privées, mise à disposition.",
      "url": "https://solocab.fr",
      "telephone": "+33-1-XX-XX-XX-XX",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "FR"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": "48.8566",
        "longitude": "2.3522"
      },
      "priceRange": "€€",
      "openingHours": "Mo-Su 00:00-24:00",
      "sameAs": [
        "https://www.facebook.com/solocab",
        "https://www.instagram.com/solocab"
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "150"
      },
      "areaServed": [
        {
          "@type": "City",
          "name": "Paris"
        },
        {
          "@type": "Place",
          "name": "Aéroport CDG"
        },
        {
          "@type": "Place",
          "name": "Aéroport Orly"
        }
      ]
    }
    </script>

    <!-- Structured Data - Service -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "serviceType": "VTC - Voiture de Transport avec Chauffeur",
      "provider": {
        "@type": "LocalBusiness",
        "name": "SoloCab"
      },
      "areaServed": "France",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Services VTC",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Transfert Aéroport"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Course Privée"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Mise à Disposition"
            }
          }
        ]
      }
    }
    </script>

    <!-- iOS Safe Area CSS -->
    <style>
      :root {
        --sat: env(safe-area-inset-top, 0px);
        --sar: env(safe-area-inset-right, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
      }
      body {
        padding-top: var(--sat);
        padding-right: var(--sar);
        padding-bottom: var(--sab);
        padding-left: var(--sal);
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
